services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: django
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    image: python:3.11
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      bash -c '
      pip install --upgrade pip &&
      pip install django psycopg2-binary debugpy &&
      cd /app &&
      python -Xfrozen_modules=off -m debugpy --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8000 --noreload
      '
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
      - "5678:5678"
    depends_on:
      - db

volumes:
  postgres_data:
